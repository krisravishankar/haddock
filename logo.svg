<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" width="200" height="160">
  <!-- Captain's Cap Logo for Haddock -->

  <!-- Cap visor (brim) -->
  <ellipse cx="100" cy="108" rx="72" ry="16" fill="#1a1a2e"/>
  <!-- Visor shine -->
  <ellipse cx="100" cy="106" rx="68" ry="12" fill="#16213e"/>
  <ellipse cx="90" cy="104" rx="40" ry="6" fill="#1a1a2e" opacity="0.5"/>

  <!-- Cap body -->
  <path d="M 40 108 Q 40 60, 100 50 Q 160 60, 160 108 Z" fill="#16213e"/>
  <!-- Cap band -->
  <path d="M 42 100 Q 42 92, 100 86 Q 158 92, 158 100 Q 158 106, 100 100 Q 42 106, 42 100 Z" fill="#0f3460"/>
  <!-- Gold band trim top -->
  <path d="M 44 94 Q 44 88, 100 83 Q 156 88, 156 94" fill="none" stroke="#e6b422" stroke-width="2"/>
  <!-- Gold band trim bottom -->
  <path d="M 42 106 Q 42 110, 100 104 Q 158 110, 158 106" fill="none" stroke="#e6b422" stroke-width="1.5"/>

  <!-- Cap crown puff -->
  <path d="M 50 70 Q 50 38, 100 30 Q 150 38, 150 70" fill="#1a1a2e"/>
  <path d="M 55 68 Q 55 42, 100 35 Q 145 42, 145 68" fill="#16213e"/>

  <!-- Anchor emblem (centered on band) -->
  <g transform="translate(100, 92)" fill="#e6b422">
    <!-- Anchor ring -->
    <circle cx="0" cy="-6" r="3" fill="none" stroke="#e6b422" stroke-width="1.5"/>
    <!-- Anchor shaft -->
    <line x1="0" y1="-3" x2="0" y2="8" stroke="#e6b422" stroke-width="1.8"/>
    <!-- Anchor crossbar -->
    <line x1="-5" y1="2" x2="5" y2="2" stroke="#e6b422" stroke-width="1.5"/>
    <!-- Anchor flukes -->
    <path d="M -6 8 Q -6 5, 0 8 Q 6 5, 6 8" fill="none" stroke="#e6b422" stroke-width="1.5"/>
    <!-- Small dots on flukes -->
    <circle cx="-6" cy="8" r="1"/>
    <circle cx="6" cy="8" r="1"/>
  </g>

  <!-- Gold leaf decoration left -->
  <g transform="translate(72, 94)" fill="none" stroke="#c9a227" stroke-width="1">
    <path d="M 0 0 Q -8 -3, -14 2 Q -8 0, 0 0"/>
    <path d="M -2 2 Q -10 1, -16 6 Q -10 4, -2 2"/>
    <path d="M -3 4 Q -11 5, -15 10 Q -9 7, -3 4"/>
  </g>

  <!-- Gold leaf decoration right -->
  <g transform="translate(128, 94)" fill="none" stroke="#c9a227" stroke-width="1">
    <path d="M 0 0 Q 8 -3, 14 2 Q 8 0, 0 0"/>
    <path d="M 2 2 Q 10 1, 16 6 Q 10 4, 2 2"/>
    <path d="M 3 4 Q 11 5, 15 10 Q 9 7, 3 4"/>
  </g>
</svg>
